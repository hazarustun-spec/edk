<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Background Boxes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── full-screen grid canvas ─────────────────── */
    #canvas {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    #grid-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #grid {
      display: flex;
      flex-wrap: wrap;
      transform: rotateX(45deg) rotateY(-10deg) rotateZ(30deg);
      will-change: transform;
    }

    .box {
      flex-shrink: 0;
      background: transparent;
      transition: background-color 0.5s ease;
      cursor: default;
    }

    /* ── content overlay ─────────────────────────── */
    #content {
      position: fixed;
      bottom: 14%;
      left: 8%;
      z-index: 10;
      color: #fff;
    }

    .label {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      margin-bottom: 0.75rem;
    }

    .label svg {
      width: 14px;
      height: 14px;
      opacity: 0.6;
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
      color: #fff;
    }

    p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.55;
      max-width: 340px;
      margin-bottom: 1.4rem;
    }

    .actions {
      display: flex;
      gap: 0.6rem;
    }

    .btn {
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.52rem 1.15rem;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.85);
      transition: background 0.18s, border-color 0.18s;
      backdrop-filter: blur(6px);
    }

    .btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.35);
      color: #fff;
    }

    .btn-primary {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>

  <div id="canvas">
    <div id="grid-wrap">
      <div id="grid"></div>
    </div>
  </div>

  <div id="content">
    <div class="label">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0h14v7H7L0 0Z" fill="currentColor"/>
        <path d="M0 7h7l7 7H7V7L0 14V7Z" fill="currentColor"/>
      </svg>
      Framer Component
    </div>
    <h1>Background Boxes</h1>
    <p>A playful, depth-aware grid that responds<br>to hover and motion in real time.</p>
    <div class="actions">
      <button class="btn btn-primary">Remix project</button>
      <button class="btn">Original</button>
    </div>
  </div>

  <script>
    (function () {
      const BOX_SIZE   = 36;
      const BORDER_CLR = 'rgba(255,255,255,0.12)';
      const SAFETY     = 1.4;
      const COLORS = [
        '#e2e8f0','#fca5a5','#fde68a',
        '#a7f3d0','#93c5fd','#c4b5fd',
        '#f9a8d4','#6ee7b7','#67e8f9'
      ];

      const canvas = document.getElementById('canvas');
      const grid   = document.getElementById('grid');
      let cols = 0, rows = 0;

      function build() {
        const W = canvas.offsetWidth;
        const H = canvas.offsetHeight;
        const diag    = Math.sqrt(W * W + H * H) * SAFETY;
        const cosX    = Math.abs(Math.cos(45 * Math.PI / 180));
        const cosY    = Math.abs(Math.cos(10 * Math.PI / 180));
        const newCols = Math.ceil(diag / cosX / BOX_SIZE) + 4;
        const newRows = Math.ceil(diag / cosY / BOX_SIZE) + 4;

        if (newCols === cols && newRows === rows) return;
        cols = newCols;
        rows = newRows;

        grid.style.width = (cols * BOX_SIZE) + 'px';

        const needed  = cols * rows;
        const current = grid.children.length;

        if (needed > current) {
          const frag = document.createDocumentFragment();
          for (let i = 0; i < needed - current; i++) {
            const b = document.createElement('div');
            b.className = 'box';
            b.style.width  = BOX_SIZE + 'px';
            b.style.height = BOX_SIZE + 'px';
            b.style.border = '1px solid ' + BORDER_CLR;
            b.addEventListener('mouseenter', () => {
              b.style.backgroundColor = COLORS[Math.random() * COLORS.length | 0];
            });
            b.addEventListener('mouseleave', () => {
              b.style.backgroundColor = 'transparent';
            });
            frag.appendChild(b);
          }
          grid.appendChild(frag);
        } else {
          while (grid.children.length > needed) grid.lastChild.remove();
        }
      }

      build();
      new ResizeObserver(build).observe(canvas);
    })();
  </script>

</body>
</html>
